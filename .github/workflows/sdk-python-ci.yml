      OFFLINE_MAX_HOURS: 72
      CLOCK_SKEW_SECONDS: 120
      REFRESH_TTL_DAYS: 7
      ACCESS_TTL_MINUTES: 15
      END_USER_AUTH_ENABLED: 'true'
      AUTH_PASSWORD_PEPPER: change-me-auth-pepper-please
      REQUEST_TIMEOUT_MS: 3000
      IDEMPOTENCY_TTL_HOURS: 24
      OTEL_ENABLED: 'false'
      METRICS_ENABLED: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install backend dependencies
        run: npm ci

      - name: Install SDK dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "sdk/python[dev]"

      - name: Prepare database
        run: |
          npm run api:prisma:migrate:deploy
          npm run api:prisma:seed

      - name: Start local API
        run: |
          npm run api:dev > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid

      - name: Wait API health
        run: |
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:3001/api/v2/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          cat /tmp/api.log || true
          exit 1

      - name: Integration tests (SDK x local API)
        env:
          SDK_INTEGRATION_BASE_URL: http://127.0.0.1:3001
          SDK_INTEGRATION_PROGRAM_ID: demo-program
          SDK_INTEGRATION_IDENTIFIER: user.demo@example.com
          SDK_INTEGRATION_PASSWORD: user-demo-123
          SDK_INTEGRATION_BLOCKED_IDENTIFIER: user.blocked@example.com
          SDK_INTEGRATION_BLOCKED_PASSWORD: user-blocked-123
        run: python -m pytest sdk/python/tests -m integration

      - name: Print API logs
        if: always()
        run: cat /tmp/api.log || true

      - name: Stop local API
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            kill "$(cat /tmp/api.pid)" || true
          fi
