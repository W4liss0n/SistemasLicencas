name: sdk-python-ci

on:
  push:
    paths:
      - 'sdk/python/**'
      - 'apps/api/src/modules/end-user-auth/**'
      - 'apps/api/src/modules/offline-entitlement/**'
      - 'apps/api/src/config/**'
      - 'apps/api/prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/sdk-python-ci.yml'
  pull_request:
    paths:
      - 'sdk/python/**'
      - 'apps/api/src/modules/end-user-auth/**'
      - 'apps/api/src/modules/offline-entitlement/**'
      - 'apps/api/src/config/**'
      - 'apps/api/prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/sdk-python-ci.yml'

jobs:
  sdk-python-lint-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install SDK dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "sdk/python[dev]"

      - name: Lint SDK (ruff)
        run: python -m ruff check sdk/python/src sdk/python/tests

      - name: Unit tests (SDK)
        run: python -m pytest sdk/python/tests -m "not integration"

  sdk-python-integration:
    runs-on: ubuntu-latest
    needs: sdk-python-lint-unit
    defaults:
      run:
        working-directory: .
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sistema_licencas_v2
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      PORT: 3001
      API_PREFIX: /api/v2
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sistema_licencas_v2
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret-at-least-32-characters
