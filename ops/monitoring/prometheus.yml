global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: sistema-licencas-v2-api
    metrics_path: /api/v2/metrics
    static_configs:
      - targets:
          - api:3001
