services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sistema_licencas_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_v2_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_v2_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      API_PREFIX: /api/v2
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sistema_licencas_v2
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-at-least-32-chars-long
      AUTH_PASSWORD_PEPPER: change-me-auth-pepper-at-least-16-chars
      REQUEST_TIMEOUT_MS: 3000
      IDEMPOTENCY_TTL_HOURS: 24
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: sistema-licencas-v2
      METRICS_ENABLED: "false"
      METRICS_PATH: /metrics
    command: sh -c "npm run api:prisma:migrate:deploy && npm run api:start"

volumes:
  postgres_v2_data:
  redis_v2_data:
